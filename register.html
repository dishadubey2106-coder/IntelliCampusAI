<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="card form-box shadow">

<h2 class="text-center">
Register
</h2>

<form method="POST">

<input type="text"
name="name"
placeholder="Name"
class="form-control mt-3"
required>

<input type="email"
name="email"
placeholder="Email"
class="form-control mt-3"
required>

<input type="password"
name="password"
placeholder="Password"
class="form-control mt-3"
required>

<button class="btn btn-success w-100 mt-4">
Register
</button>

</form>

</div>

</div>

</body>
</html>
